services:

  nginx:
    image: nginx:alpine
    container_name: nutriapp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/web/dist:/usr/share/nginx/web:ro
      - ./apps/pwa/dist:/usr/share/nginx/pwa:ro
    networks:
      - nutriapp

  db:
    image: postgres:16-alpine
    container_name: nutriapp-db
    restart: always
    environment:
      POSTGRES_PASSWORD: "NutriApp2024"
      POSTGRES_DB: nutriapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutriapp

  redis:
    image: redis:7-alpine
    container_name: nutriapp-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nutriapp

volumes:
  postgres_data:
  redis_data:

networks:
  nutriapp:
    driver: bridge