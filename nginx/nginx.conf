events { worker_connections 1024; }

http {
  include mime.types;
  default_type application/octet-stream;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  server {
    listen 80;
    server_name salusmetrics.com.br www.salusmetrics.com.br;
    root /usr/share/nginx/web;
    index index.html;
    location /api { proxy_pass http://api:3000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location / { try_files $uri $uri/ /index.html; }
  }

  server {
    listen 80;
    server_name app.salusmetrics.com.br;
    root /usr/share/nginx/pwa;
    index index.html;
    location /api { proxy_pass http://api:3000; proxy_set_header Host $host; }
    location / { try_files $uri $uri/ /index.html; }
  }
}
